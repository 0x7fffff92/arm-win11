name: RDP via Tailscale (Windows ARM, LarePass)

on:
    workflow_dispatch:
        inputs:
            installer_url:
                description: 'LarePass installer URL (leave empty to skip install)'
                required: false
                default: 'https://cdn.olares.com/LarePass/v1.10.66/LarePass-setup-1.10.66.exe'
            rdp_password:
                description: 'Password to set for the RDP user (runneradmin)'
                required: true
            keep_alive_minutes:
                description: 'How long to keep the runner alive for RDP (minutes)'
                required: true
                default: '60'

jobs:
    rdp:
        runs-on: windows-11-arm
        steps:
            - name: Download & install LarePass (optional)
              if: ${{ github.event.inputs.installer_url != '' }}
              shell: pwsh
              run: |
                $url = "${{ github.event.inputs.installer_url }}"
                $installer = "$env:RUNNER_TEMP\LarePass-setup.exe"
                Write-Host "Downloading: $url"
                Invoke-WebRequest -Uri $url -OutFile $installer
                Write-Host "Installing silently..."
                $proc = Start-Process -FilePath $installer -ArgumentList "/S" -PassThru -Wait
                Write-Host "Installer exit code: $($proc.ExitCode)"

            - name: Enable Remote Desktop
              shell: pwsh
              run: |
                Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0
                Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name 'UserAuthentication' -Value 1
                # The built-in "Remote Desktop" rules are scoped to Private/Domain.
                # The Tailscale interface is usually classed as Public, so add an
                # explicit inbound rule for 3389 that applies to ALL profiles.
                Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
                New-NetFirewallRule -DisplayName "RDP-Tailscale-AnyProfile" `
                  -Direction Inbound -Action Allow -Protocol TCP -LocalPort 3389 `
                  -Profile Any -ErrorAction SilentlyContinue
                Set-Service -Name TermService -StartupType Automatic
                Start-Service -Name TermService
                Write-Host "Remote Desktop enabled."

            - name: RDP / firewall diagnostics
              shell: pwsh
              run: |
                Write-Host "=== TermService status ==="
                Get-Service TermService | Format-List Name, Status, StartType
                Write-Host "=== Listening on 3389? ==="
                Get-NetTCPConnection -LocalPort 3389 -State Listen -ErrorAction SilentlyContinue |
                  Select-Object LocalAddress, LocalPort, State | Format-Table -AutoSize
                Write-Host "=== Firewall rules for 3389 ==="
                Get-NetFirewallPortFilter -Protocol TCP |
                  Where-Object { $_.LocalPort -eq 3389 } |
                  ForEach-Object { Get-NetFirewallRule -AssociatedNetFirewallPortFilter $_ -ErrorAction SilentlyContinue } |
                  Select-Object DisplayName, Enabled, Direction, Action, Profile | Format-Table -AutoSize
                Write-Host "=== Network adapter profiles ==="
                Get-NetConnectionProfile | Select-Object InterfaceAlias, NetworkCategory | Format-Table -AutoSize

            - name: Set RDP user password
              shell: pwsh
              run: |
                $pwd = ConvertTo-SecureString "${{ github.event.inputs.rdp_password }}" -AsPlainText -Force
                Set-LocalUser -Name "runneradmin" -Password $pwd
                Write-Host "Password set for user: runneradmin"

            - name: Install & connect Tailscale
              shell: pwsh
              env:
                TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
              run: |
                if (-not $env:TS_AUTHKEY) {
                  Write-Error "Missing TS_AUTHKEY secret. Create one at https://login.tailscale.com/admin/settings/keys and add it in repo Settings > Secrets and variables > Actions."
                  exit 1
                }
                # Download the Windows ARM64 Tailscale installer
                $msi = "$env:RUNNER_TEMP\tailscale-arm64.msi"
                Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-arm64.msi" -OutFile $msi
                Write-Host "Installing Tailscale..."
                Start-Process msiexec.exe -ArgumentList "/i", "`"$msi`"", "/quiet", "/norestart" -Wait
                $ts = "C:\Program Files\Tailscale\tailscale.exe"
                # The service may take a moment to come up
                for ($i = 0; $i -lt 15; $i++) {
                  if (Test-Path $ts) { break }
                  Start-Sleep -Seconds 2
                }
                Write-Host "Bringing Tailscale up..."
                & $ts up --authkey="$env:TS_AUTHKEY" --hostname="larepass-arm-runner" --unattended --accept-routes
                Start-Sleep -Seconds 5
                $ip = (& $ts ip -4).Trim()
                Write-Host "============================================"
                Write-Host "RDP connect address (Tailscale IP): $ip"
                Write-Host "Username: runneradmin"
                Write-Host "Password: (the rdp_password you provided)"
                Write-Host "Connect from a device on the SAME tailnet."
                Write-Host "============================================"

            - name: Keep alive for RDP session
              shell: pwsh
              run: |
                $minutes = [int]"${{ github.event.inputs.keep_alive_minutes }}"
                Write-Host "Keeping runner alive for $minutes minutes. Connect via RDP now."
                $deadline = (Get-Date).AddMinutes($minutes)
                while ((Get-Date) -lt $deadline) {
                  $remaining = [int]($deadline - (Get-Date)).TotalMinutes
                  Write-Host "Still alive... ~$remaining min remaining"
                  Start-Sleep -Seconds 60
                }
                Write-Host "Time is up. Shutting down."

